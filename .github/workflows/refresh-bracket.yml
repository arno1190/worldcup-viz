name: Refresh data

# Pulls the latest 2026 World Cup knockout results and player/team stats from
# Wikipedia every night and commits them. With Vercel's Git integration
# connected, the commit triggers a production redeploy automatically — no
# secrets required.

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update bracket (results + kickoff times) from Wikipedia
        run: node scripts/update-bracket.mjs || echo "bracket refresh aborted; keeping last good snapshot"

      - name: Update player/team stats from Wikipedia
        run: node scripts/update-stats.mjs || echo "stats refresh aborted; keeping last good stats"

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name "worldcup-bot"
            git config user.email "actions@github.com"
            git add data/bracket.json data/stats.json
            git commit -m "chore: nightly data refresh ($(date -u +%Y-%m-%d))"
            git push
            echo "Pushed refreshed data."
          else
            echo "No data changes."
          fi
