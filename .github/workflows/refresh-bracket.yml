name: Refresh data

# Pulls the latest 2026 World Cup bracket + player/team stats from the Zafronix
# World Cup API every night and commits them. With Vercel's Git integration
# connected, the commit triggers a production redeploy automatically.
# Requires repo secret ZAFRONIX_KEY. Uses ~3 API calls/run (free tier: 250/day).

on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC nightly (GitHub may delay scheduled runs)
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      ZAFRONIX_KEY: ${{ secrets.ZAFRONIX_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update bracket (results + kickoff times)
        run: node scripts/update-bracket.mjs || echo "bracket refresh aborted; keeping last good snapshot"

      - name: Update player/team stats
        run: node scripts/update-stats.mjs || echo "stats refresh aborted; keeping last good stats"

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name "worldcup-bot"
            git config user.email "actions@github.com"
            git add data/bracket.json data/stats.json
            git commit -m "chore: nightly data refresh ($(date -u +%Y-%m-%d))"
            git push
            echo "Pushed refreshed data."
          else
            echo "No data changes."
          fi
